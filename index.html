<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keeproutine 連携</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { font-family: -apple-system, sans-serif; margin: 24px; }
      input, button { width: 100%; padding: 12px; font-size: 16px; }
      button { margin-top: 12px; }
      .muted { color: #666; font-size: 12px; margin-top: 8px; }
      .error { color: #d00; }
      .success { color: #0a0; }
    </style>
  </head>
  <body>
    <h2>LINE連携</h2>
    <p>アプリで発行した連携コードを入力してください。</p>
    <input id="code" placeholder="連携コード" />
    <button id="submit" disabled>連携する</button>
    <p id="message" class="muted"></p>
    <div id="status-log" style="font-size: 10px; color: #888; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
      <strong>Debug Log:</strong>
      <ul id="log-list" style="list-style: none; padding: 0;"></ul>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const defaultLiffId = "2008961313-udzVjHhi";
      const defaultEndpoint = "https://mvzorfznpwgjflhsjspc.supabase.co/functions/v1/line-link";
      const liffId = params.get("liffId") || defaultLiffId;
      const endpoint = params.get("endpoint") || defaultEndpoint;
      const message = document.getElementById("message");
      const button = document.getElementById("submit");
      const codeInput = document.getElementById("code");
      const logList = document.getElementById("log-list");
      let ready = false;

      function addLog(msg) {
        const li = document.createElement("li");
        li.textContent = `${new Date().toLocaleTimeString()}: ${msg}`;
        logList.insertBefore(li, logList.firstChild);
        console.log(msg);
      }

      async function init() {
        addLog("Initializing LIFF...");
        addLog(`Current URL: ${location.href}`);
        
        // ログイン前にコードを一時保存
        const urlCode = params.get("code");
        if (urlCode) {
          sessionStorage.setItem("link_code", urlCode);
          addLog("Code saved to storage");
        }

        if (!liffId || !endpoint) {
          message.textContent = "設定が不足しています。URLを確認してください。";
          message.className = "muted error";
          addLog("Missing config: liffId or endpoint");
          return;
        }
        try {
          await liff.init({ liffId });
          addLog("LIFF init success");
          
          if (!liff.isLoggedIn()) {
            addLog("Not logged in, starting login...");
            liff.login({ redirectUri: location.href });
            return;
          }
          
          addLog("User is logged in");
          ready = true;
          message.textContent = "";
          updateButtonState();

          // メモリまたはURLからコードを取得
          const autoCode = urlCode || sessionStorage.getItem("link_code");
          addLog(`Code found: ${autoCode || "none"}`);
          
          if (autoCode) {
            addLog("Starting auto-link...");
            codeInput.value = autoCode;
            updateButtonState();
            // 一度実行したらメモリをクリア
            sessionStorage.removeItem("link_code");
            await performLink(autoCode);
          }
        } catch (error) {
          addLog(`Init error: ${error}`);
          message.textContent = "LINE内で開いてください。";
          message.className = "muted error";
        }
      }

      function updateButtonState() {
        const hasCode = codeInput.value.trim().length > 0;
        button.disabled = !ready || !hasCode;
      }

      codeInput.addEventListener("input", updateButtonState);
      codeInput.addEventListener("change", updateButtonState);
      codeInput.addEventListener("keyup", updateButtonState);

      async function performLink(code) {
        try {
          addLog(`Connecting to: ${endpoint}`);
          message.textContent = "連携中...";
          message.className = "muted";
          
          const profile = await liff.getProfile();
          addLog(`Got profile: ${profile.displayName}`);
          
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code, lineUserId: profile.userId }),
          });
          
          const text = await res.text();
          addLog(`Server response: ${res.status}`);
          
          if (res.ok) {
            addLog("Success! Closing window in 3s...");
            message.textContent = "連携が完了しました！この画面を閉じてトーク画面に戻ってください。";
            message.className = "muted success";
            button.disabled = true;
            if (liff.isInClient()) {
              setTimeout(() => { liff.closeWindow(); }, 3000);
            }
          } else {
            addLog(`Error from server: ${text}`);
            message.textContent = `連携に失敗: ${res.status} ${text}`;
            message.className = "muted error";
          }
        } catch (error) {
          addLog(`Fetch error: ${error}`);
          message.textContent = `連携に失敗: ${error}`;
          message.className = "muted error";
        }
      }

      button.addEventListener("click", async () => {
        const code = codeInput.value.trim();
        if (!code) {
          message.textContent = "連携コードを入力してください。";
          message.className = "muted error";
          return;
        }
        await performLink(code);
      });

      init();
    </script>
  </body>
</html>
