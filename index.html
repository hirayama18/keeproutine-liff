<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keeproutine 連携</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { font-family: -apple-system, sans-serif; margin: 24px; }
      input, button { width: 100%; padding: 12px; font-size: 16px; }
      button { margin-top: 12px; }
      .muted { color: #666; font-size: 12px; margin-top: 8px; }
      .error { color: #d00; }
      .success { color: #0a0; }
    </style>
  </head>
  <body>
    <h2>LINE連携</h2>
    <p>アプリで発行した連携コードを入力してください。</p>
    <input id="code" placeholder="連携コード" />
    <button id="submit">連携する</button>
    <p id="message" class="muted"></p>

    <script>
      const liffId = new URLSearchParams(location.search).get("liffId");
      const endpoint = new URLSearchParams(location.search).get("endpoint");
      const message = document.getElementById("message");

      async function init() {
        if (!liffId || !endpoint) {
          message.textContent = "設定が不足しています。";
          message.className = "muted error";
          return;
        }
        await liff.init({ liffId });
      }

      document.getElementById("submit").addEventListener("click", async () => {
        const code = document.getElementById("code").value.trim();
        if (!code) {
          message.textContent = "連携コードを入力してください。";
          message.className = "muted error";
          return;
        }
        const profile = await liff.getProfile();
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, lineUserId: profile.userId }),
        });
        if (res.ok) {
          message.textContent = "連携が完了しました。";
          message.className = "muted success";
        } else {
          const data = await res.json().catch(() => ({}));
          message.textContent = data.error ? `連携に失敗: ${data.error}` : "連携に失敗しました。";
          message.className = "muted error";
        }
      });

      init();
    </script>
  </body>
</html>
